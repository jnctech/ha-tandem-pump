# Tandem Source — Gitea inner-loop CI
#
# Runner requirements:
#   - Gitea Act runner (ubuntu-latest label)
#   - Outbound: Gitea server, PyPI, GitHub (for actions/checkout, setup-python)
#   - Minimum memory: 2GB
#
# Target: completes in < 3 minutes on a warm runner

name: CI

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  ci:
    name: Lint · Format · Test · Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: python -m ruff check custom_components/carelink tests

      - name: Ruff format check
        run: python -m ruff format --check custom_components/carelink tests

      - name: Run tests
        run: python -m pytest -v --tb=short --cov=custom_components/carelink --cov-report=term-missing

      - name: Bandit security scan
        run: |
          pip install bandit[toml]
          python -m bandit -c bandit.yaml -r custom_components/carelink

      - name: Install Gitleaks
        run: |
          curl -sSfL --proto-redir -all,https \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Gitleaks secret scan (HEAD only)
        run: |
          RANGE=$(git rev-parse --verify HEAD~1 2>/dev/null && echo "HEAD~1..HEAD" || echo "HEAD")
          gitleaks detect --source . --config .gitleaks.toml --log-opts "$RANGE" --redact

      - name: Hadolint (Dockerfile lint)
        run: |
          curl -sSfL --proto-redir -all,https \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint
          hadolint Dockerfile.test .devcontainer/Dockerfile

      - name: Actionlint (workflow lint)
        run: |
          curl -sSfL --proto-redir -all,https \
            https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz \
            | tar -xz actionlint
          ./actionlint -color
