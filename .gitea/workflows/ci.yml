# Tandem Source — Gitea inner-loop CI
#
# Runner requirements:
#   - Docker executor (Gitea Act runner)
#   - Non-root user inside container
#   - VLAN-restricted: outbound to Gitea server and PyPI only
#   - Minimum memory: 2GB
#
# Target: completes in < 3 minutes on a warm runner

name: CI

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  ci:
    name: Lint · Format · Test · Security
    runs-on: ubuntu-latest
    container: python:3.12-slim

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: python -m ruff check custom_components/carelink tests

      - name: Ruff format check
        run: python -m ruff format --check custom_components/carelink tests

      - name: Run tests
        run: python -m pytest -v --tb=short

      - name: Bandit security scan
        run: |
          pip install bandit[toml]
          python -m bandit -c bandit.yaml -r custom_components/carelink

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Gitleaks secret scan (HEAD only)
        run: gitleaks detect --source . --config .gitleaks.toml --log-opts "HEAD~1..HEAD" --redact
