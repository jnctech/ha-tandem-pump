name: CI

on:
  push:
    branches: [master, develop, "release/*"]
  pull_request:
    branches: [master, develop]

permissions: {}

jobs:
  lint:
    name: Python Code Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ruff (lint)
        run: ruff check custom_components/carelink tests

      - name: Run ruff (format check)
        run: ruff format --check custom_components/carelink tests

  test:
    name: Python Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: >
          pytest -v --tb=short
          --cov=custom_components/carelink
          --cov-report=xml:coverage.xml
          --cov-report=term-missing

  security:
    name: Security check - Bandit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: bandit -c bandit.yaml -r custom_components/carelink

  hassfest:
    name: Check hassfest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  secrets:
    name: Secret scanning - Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: false
