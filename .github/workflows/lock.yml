name: Lock threads

permissions:
  issues: write
  pull-requests: write

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-inactive-days: "365"
          pr-inactive-days: "365"
          issue-comment: >
            This issue has been automatically locked since there has not been any
            recent activity after it was closed. Please open a new issue for related bugs.
          pr-comment: >
            This pull request has been automatically locked since there has not been
            any recent activity after it was closed. Please open a new issue for
            related bugs.
