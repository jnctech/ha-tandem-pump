name: Release

permissions:
  contents: write

on:
  release:
    types: [published]

jobs:
  release:
    name: Build and Upload Release Asset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; d=json.load(open('custom_components/carelink/manifest.json')); print(d['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create release zip
        run: cd custom_components && zip -r ../carelink.zip carelink/

      - name: Generate SBOM
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d  # v0
        with:
          path: custom_components/carelink/
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload release asset
        uses: svenstaro/upload-release-action@b98a3b12e86552593f3e4e577ca8a62aa2f3f22b  # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: carelink.zip
          asset_name: carelink-${{ steps.version.outputs.version }}.zip
          tag: ${{ github.ref }}
          overwrite: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom-${{ steps.version.outputs.version }}
          path: sbom.spdx.json
          retention-days: 90
