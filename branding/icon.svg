<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066CC;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#004499;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00CC66;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00DD77;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00CC66;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Glucose wave line (CGM trace) -->
  <path d="M 80 300 Q 130 180, 180 240 Q 230 300, 260 220 Q 290 140, 320 200 Q 350 260, 380 180 Q 410 100, 432 200"
        stroke="url(#wave)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Small insulin drop icon -->
  <path d="M 256 360 C 256 360, 220 400, 220 420 C 220 440, 236 456, 256 456 C 276 456, 292 440, 292 420 C 292 400, 256 360, 256 360 Z"
        fill="white" opacity="0.9"/>
  <!-- Target range bands (subtle) -->
  <rect x="80" y="195" width="352" height="90" rx="8" fill="white" opacity="0.08"/>
</svg>
