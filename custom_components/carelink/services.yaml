import_history:
  name: Import Tandem History
  description: >
    Manually import pump events as long-term statistics for a specified date range.
    Use this to recover data missed when the Tandem app was not syncing in the background.
    Imports CGM glucose readings, active insulin (IOB), and basal rate statistics.
  fields:
    start_date:
      name: Start Date
      description: First date to import (inclusive), in YYYY-MM-DD format.
      required: true
      example: "2026-03-01"
      selector:
        date:
    end_date:
      name: End Date
      description: >
        Last date to import (inclusive), in YYYY-MM-DD format.
        Defaults to today if not provided.
      required: false
      example: "2026-03-06"
      selector:
        date:

capture_diagnostics:
  name: Capture Diagnostics
  description: >
    Capture a diagnostic snapshot of the current API response and sensor state.
    Writes a sanitised JSON file to /config/carelink_diagnostics_<timestamp>.json.
    Use this to document API schema, troubleshoot missing sensors, or report bugs.
    PII fields (names, dates of birth) are automatically redacted.
