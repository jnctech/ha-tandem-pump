services:
  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    volumes:
      - .:/app:cached
      - pip-cache:/home/testuser/.cache/pip
    command: >
      bash -c "pip install --user --quiet -r requirements.txt &&
               python -m pytest -v --tb=short --cov=custom_components/carelink --cov-report=term-missing"
    networks:
      - test-network

networks:
  test-network:
    driver: bridge

volumes:
  pip-cache:
